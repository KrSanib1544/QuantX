apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: quantx-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8005
        env:
        - name: DATABASE_URL
          value: "postgresql://quantx_user:quantx_password@postgres:5432/quantx_db"
        - name: PORTFOLIO_SERVICE_URL
          value: "http://portfolio-service:8004/execute-manual"
        - name: PORTFOLIO_REBALANCE_URL
          value: "http://portfolio-service:8004/rebalance"
        - name: AI_PREDICTION_SERVICE_URL
          value: "http://ai-prediction-service:8006"
        - name: QUANTUM_RESEARCH_SERVICE_URL
          value: "http://quantum-research-service:8007"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8005
    targetPort: 8005
  type: ClusterIP

---

