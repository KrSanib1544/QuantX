global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8005']

  - job_name: 'market-data-service'
    static_configs:
      - targets: ['market-data-service:8001']

  - job_name: 'feature-service'
    static_configs:
      - targets: ['feature-service:8002']

  - job_name: 'portfolio-service'
    static_configs:
      - targets: ['portfolio-service:8004']

  - job_name: 'signal-service'
    static_configs:
      - targets: ['signal-service:8003']
